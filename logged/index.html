<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jeu de Roulette de Hasard</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <h1> Jeu de Roulette - FAIYAAA</h1>

        <form id="form">
            <input type="text" id="prenom1" placeholder="Prénom 1" required>
            <input type="text" id="prenom2" placeholder="Prénom 2" required>
            <textarea id="defis" placeholder="Liste de défis, séparés par des virgules..." required></textarea>
            <button type="submit">Lancer la Roulette !</button>
        </form>

        <div class="roulette-container">
            <div class="roulette" id="roulette">
                <!-- Les résultats seront injectés ici -->
            </div>
        </div>

        <div class="resultat" id="resultat"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
